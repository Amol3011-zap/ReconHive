version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: reconhive-db
    environment:
      POSTGRES_USER: ${DB_USER:-reconhive_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password_change_me}
      POSTGRES_DB: ${DB_NAME:-reconhive}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-reconhive_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - reconhive-net

  api:
    build: .
    container_name: reconhive-api
    environment:
      DATABASE_URL: postgresql://${DB_USER:-reconhive_user}:${DB_PASSWORD:-secure_password_change_me}@postgres:5432/${DB_NAME:-reconhive}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change_me_in_production_to_a_secure_random_string}
      JWT_ALGORITHM: HS256
      JWT_EXPIRATION_MINUTES: 30
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:8000
      DEBUG: "false"
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    networks:
      - reconhive-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: node:20-alpine
    container_name: reconhive-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    command: npm run dev
    depends_on:
      - api
    networks:
      - reconhive-net
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000

volumes:
  postgres_data:

networks:
  reconhive-net:
    driver: bridge
