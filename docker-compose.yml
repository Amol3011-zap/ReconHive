version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: reconhive-db
    environment:
      POSTGRES_USER: ${DB_USER:-reconhive_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password_change_me}
      POSTGRES_DB: ${DB_NAME:-reconhive}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-reconhive_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - reconhive-net

  api:
    build: .
    container_name: reconhive-api
    environment:
      DATABASE_URL: postgresql://${DB_USER:-reconhive_user}:${DB_PASSWORD:-secure_password_change_me}@postgres:5432/${DB_NAME:-reconhive}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change_me_in_production_to_a_secure_random_string}
      JWT_ALGORITHM: HS256
      JWT_EXPIRATION_MINUTES: 30
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:8000
      DEBUG: "false"
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - reconhive-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: node:20-alpine
    container_name: reconhive-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0"
    depends_on:
      - api
    networks:
      - reconhive-net
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000

  # ===== DEVELOPER TOOLS =====

  # PostgreSQL Administration
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: reconhive-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@reconhive.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: 'False'
      PGADMIN_CONFIG_COOKIE_DEFAULT_SECURE: 'False'
      PGADMIN_CONFIG_COOKIE_DEFAULT_SAMESITE: 'Lax'
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - reconhive-net
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  # Lightweight Database Browser
  adminer:
    image: adminer:latest
    container_name: reconhive-adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - reconhive-net
    environment:
      ADMINER_DEFAULT_SERVER: postgres

  # Redis for Celery and caching
  redis:
    image: redis:7-alpine
    container_name: reconhive-redis
    ports:
      - "6379:6379"
    networks:
      - reconhive-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Celery Worker
  celery:
    build: .
    container_name: reconhive-celery
    command: celery -A app.tasks worker --loglevel=info
    environment:
      DATABASE_URL: postgresql://${DB_USER:-reconhive_user}:${DB_PASSWORD:-secure_password_change_me}@postgres:5432/${DB_NAME:-reconhive}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      - postgres
      - redis
      - api
    networks:
      - reconhive-net
    volumes:
      - ./backend/app:/app/app

  # Celery Task Monitoring
  flower:
    image: mher/flower:latest
    container_name: reconhive-flower
    command: celery --broker=redis://redis:6379/0 flower --port=5555
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - celery
    networks:
      - reconhive-net
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0

  # Local SMTP Testing
  mailpit:
    image: axllent/mailpit:latest
    container_name: reconhive-mailpit
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - reconhive-net

  # Prometheus Metrics Collection
  prometheus:
    image: prom/prometheus:latest
    container_name: reconhive-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    depends_on:
      - api
    networks:
      - reconhive-net

  # Grafana Dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: reconhive-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: redis-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - reconhive-net

volumes:
  postgres_data:
  pgadmin_data:
  prometheus_data:
  grafana_data:

networks:
  reconhive-net:
    driver: bridge
